══════════════════════════════════════════════════════════ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  background: #050e0d;
  overflow: hidden;
}

/* ── Core overlay ── */
#preloader {
  position: fixed;
  inset: 0;
  z-index: 99999;
  background: #050e0d;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: clamp(2rem, 5vh, 3.5rem);
  will-change: opacity, transform;
}

/* Ambient radial glow behind logo */
#preloader::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 60% at 50% 45%, rgba(0, 178, 160, 0.055) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 25% 80%, rgba(0,  76,  68, 0.06)  0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* ── Logo wrapper ── */
.pl-logo-wrap {
  position: relative;
  z-index: 1;
  width: min(420px, 80vw);
  filter: drop-shadow(0 0 0px rgba(0, 178, 160, 0));
}

.pl-logo-wrap.pl-glow {
  animation: plGlow 2.6s ease-in-out infinite;
}

@keyframes plGlow {
  0%,  100% { filter: drop-shadow(0 0  0px rgba(0, 178, 160, 0.00)); }
  50%        { filter: drop-shadow(0 0 30px rgba(0, 178, 160, 0.50)); }
}

#pl-svg {
  width: 100%;
  height: auto;
  display: block;
  /* Paths start with fill/stroke controlled by JS */
}

/* ── Loading bar ── */
.pl-bar-track {
  position: relative;
  z-index: 1;
  width: min(180px, 52vw);
  height: 1.5px;
  background: rgba(255, 255, 255, 0.07);
  border-radius: 99px;
  overflow: hidden;
}

.pl-bar-fill {
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, #004C44, #00B2A0 55%, #18cbff);
  border-radius: 99px;
  transform: scaleX(0);
  transform-origin: left center;
  transition: transform 2.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

.pl-bar-fill.pl-bar-run {
  transform: scaleX(1);
}

/* ── Exit ── */
#preloader.pl-exit {
  animation: plExit 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  pointer-events: none;
}

@keyframes plExit {
  0%   { opacity: 1; transform: scale(1);    }
  100% { opacity: 0; transform: scale(1.04); }
}
</style>

<script>
/**
 * AXYOM PRELOADER — inline animation script
 *
 * For production: move this to preloader.js and load it via <script src="preloader.js">
 *
 * Public API:
 *   window.hidePreloader(callback?)  — hide immediately (cancels auto-exit timer)
 */
(function () {
  'use strict';

  /* ── CONFIG ───────────────────────────────── */
  var DRAW_DURATION = 1000;   // ms per path stroke animation
  var STAGGER       = 85;     // ms between successive path starts
  var FILL_DELAY    = DRAW_DURATION + 6 * STAGGER + 240;
  var FILL_DURATION = 650;
  var GLOW_DELAY    = FILL_DELAY + Math.round(FILL_DURATION * 0.55);
  var EXIT_DELAY    = 3300;

  /* ── ELEMENTS ─────────────────────────────── */
  var preloader = document.getElementById('preloader');
  var logoWrap  = document.getElementById('pl-logo-wrap');
  var barFill   = document.getElementById('pl-bar-fill');
  var svg       = document.getElementById('pl-svg');

  if (!preloader || !svg) return;

  /* ── PATH ORDER — left → right visual reveal ── */
  var pathOrder = [
    'pl-p0',  // Decorative A mark     (gradient, spans full width, drawn first as anchor)
    'pl-p1',  // letter a              (far left text)
    'pl-p5',  // tiny x chip
    'pl-p4',  // x lower piece
    'pl-p6',  // x / y body
    'pl-p3',  // o
    'pl-p2',  // mm (rightmost)
  ];

  var paths = pathOrder.map(function (id) {
    return document.getElementById(id);
  }).filter(Boolean);

  var originalFills = paths.map(function (p) {
    return p.getAttribute('fill');
  });

  /* ── PHASE 1: Stroke setup + draw ─────────── */
  paths.forEach(function (p, i) {
    var len        = Math.ceil(p.getTotalLength());
    var isGradient = originalFills[i] && originalFills[i].indexOf('url(') === 0;

    p.setAttribute('fill',           'none');
    p.setAttribute('stroke',         isGradient ? 'url(#pl-stroke-grad)' : 'rgba(255,255,255,0.85)');
    p.setAttribute('stroke-width',   '5');
    p.setAttribute('stroke-linejoin','round');
    p.setAttribute('stroke-linecap', 'round');

    p.style.strokeDasharray  = String(len);
    p.style.strokeDashoffset = String(len);
  });

  /* Double rAF — ensures initial invisible state renders before transition fires */
  requestAnimationFrame(function () {
    requestAnimationFrame(function () {
      paths.forEach(function (p, i) {
        p.style.transition =
          'stroke-dashoffset ' + DRAW_DURATION + 'ms ' +
          'cubic-bezier(0.4,0,0.2,1) ' +
          (i * STAGGER) + 'ms';
        p.style.strokeDashoffset = '0';
      });
    });
  });

  /* ── PHASE 2: Fill fades in, stroke fades out ── */
  var fillTimer = setTimeout(function () {
    paths.forEach(function (p, i) {
      var delay = i * 50;
      p.style.transition = [
        'fill '           + FILL_DURATION                       + 'ms ease ' + delay + 'ms',
        'stroke-opacity ' + Math.round(FILL_DURATION * 0.65)   + 'ms ease ' + delay + 'ms',
      ].join(', ');
      p.setAttribute('fill', originalFills[i]);
      p.style.strokeOpacity = '0';
    });
  }, FILL_DELAY);

  /* ── PHASE 3: Glow pulse ────────────────────── */
  var glowTimer = setTimeout(function () {
    if (logoWrap) logoWrap.classList.add('pl-glow');
  }, GLOW_DELAY);

  /* ── LOADING BAR ────────────────────────────── */
  requestAnimationFrame(function () {
    if (barFill) barFill.classList.add('pl-bar-run');
  });

  /* ── EXIT ───────────────────────────────────── */
  function doExit(cb) {
    preloader.classList.add('pl-exit');
    preloader.addEventListener('animationend', function () {
      preloader.style.display = 'none';
      document.documentElement.classList.remove('preloader-active');
      if (typeof cb === 'function') cb();
    }, { once: true });
  }

  var exitTimer = setTimeout(function () { doExit(); }, EXIT_DELAY);

  /* ── PUBLIC API ─────────────────────────────── */
  /**
   * Call window.hidePreloader() to dismiss immediately.
   * Useful when all assets have loaded:
   *
   *   window.addEventListener('load', function () {
   *     window.hidePreloader();
   *   });
   */
  window.hidePreloader = function (callback) {
    clearTimeout(fillTimer);
    clearTimeout(glowTimer);
    clearTimeout(exitTimer);
    doExit(callback);
  };

})();
</script>
