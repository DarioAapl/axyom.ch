<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AXYOM · Reset Password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dashboard.css?v=20260514a">
  <link rel="icon" type="image/png" href="../Assets/axyomfavicon.png">
  <link rel="apple-touch-icon" href="../Assets/axyomfavicon.png">
</head>
<body class="login-page">

<div class="login-scene">
  <div class="login-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="login-card" style="text-align:center">
    <div class="login-brand">
      <img src="../Assets/axyomwhitelogo.png" alt="AXYOM" style="height:28px;display:block">
      <h1>AXYOM</h1>
    </div>

    <div id="stateForm" style="margin-top:24px;text-align:left">
      <h2 style="color:var(--accent);margin-bottom:6px;text-align:center">Set a new password</h2>
      <p class="login-sub" style="text-align:center;margin-bottom:20px">Enter a new password for your account.</p>

      <form id="resetForm" onsubmit="submitReset(event)">
        <div class="input-group" style="margin-bottom:14px">
          <label for="pw1">New password</label>
          <input id="pw1" type="password" placeholder="Min. 8 characters"
                 autocomplete="new-password" required minlength="8"/>
        </div>
        <div class="input-group" style="margin-bottom:18px">
          <label for="pw2">Confirm password</label>
          <input id="pw2" type="password" placeholder="Repeat password"
                 autocomplete="new-password" required minlength="8"/>
        </div>
        <div class="error-msg" id="errMsg" style="margin-bottom:14px;min-height:18px"></div>
        <button class="btn-primary" type="submit" id="submitBtn" style="width:100%">
          Reset password
        </button>
      </form>
    </div>

    <div id="stateSuccess" style="display:none;margin-top:24px">
      <div style="font-size:48px;margin-bottom:12px">✅</div>
      <h2 style="color:var(--accent);margin-bottom:8px">Password reset</h2>
      <p class="login-sub">You're being redirected to your dashboard…</p>
    </div>

    <div id="stateError" style="display:none;margin-top:24px">
      <div style="font-size:48px;margin-bottom:12px">❌</div>
      <h2 style="color:#e05252;margin-bottom:8px">Reset failed</h2>
      <p class="login-sub" id="errorMsg">The link is invalid or has expired.</p>
      <a href="login.html" class="btn-primary"
         style="display:inline-block;margin-top:20px;text-decoration:none">
        Back to login
      </a>
    </div>
  </div>
</div>

<script>
const API = "https://api.axyom.ch";
const TOKEN = new URLSearchParams(location.search).get("token");

if (!TOKEN) {
  show("stateError");
  document.getElementById("errorMsg").textContent = "No reset token found in the URL.";
}

async function submitReset(event) {
  event.preventDefault();
  const pw1 = document.getElementById("pw1").value;
  const pw2 = document.getElementById("pw2").value;
  const errEl = document.getElementById("errMsg");
  const btn = document.getElementById("submitBtn");

  errEl.textContent = "";
  if (pw1.length < 8) { errEl.textContent = "Password must be at least 8 characters."; return; }
  if (pw1 !== pw2)    { errEl.textContent = "Passwords don't match."; return; }

  btn.disabled = true;
  btn.textContent = "Resetting…";

  try {
    const res = await fetch(`${API}/customer/reset-password`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token: TOKEN, new_password: pw1 }),
    });
    const data = await res.json();

    if (!res.ok) {
      errEl.textContent = friendlyError(data.detail, "Reset failed. The link may be invalid or expired.");
      btn.disabled = false;
      btn.textContent = "Reset password";
      return;
    }

    if (data.access_token) {
      localStorage.setItem("customer_token", data.access_token);
      localStorage.setItem("customer_id", data.customer_id);
    }
    show("stateSuccess");
    setTimeout(() => { location.href = "/dashboard/"; }, 2000);
  } catch (err) {
    errEl.textContent = "Network error. Please try again.";
    btn.disabled = false;
    btn.textContent = "Reset password";
  }
}

function friendlyError(detail, fallback) {
  if (!detail || typeof detail !== 'string') return fallback;
  if (/\/[a-z]+\/|GET\s|POST\s|Call\s/.test(detail)) return fallback;
  return detail;
}

function show(id) {
  document.getElementById("stateForm").style.display = "none";
  document.getElementById(id).style.display = "block";
}
</script>

</body>
</html>
