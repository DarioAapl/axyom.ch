<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AXYOM · Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dashboard.css?v=20260319a">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
</head>

<body class="dashboard-page">

<!-- ═══ Top Nav ═══ -->
<header class="nav">
  <div class="brand">
    <img src="/adminlogo.png" alt="AXYOM" style="height:28px;display:block">
  </div>
  <div class="nav-right">
    <span class="nav-pill" id="customerEmail">—</span>
    <button class="btn-nav" onclick="logout()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Logout
    </button>
  </div>
</header>

<main class="dashboard">

  <!-- ═══ Stats Row ═══ -->
  <section class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20"/>
        </svg>
      </div>
      <div class="stat-content">
        <span class="stat-label">Websites</span>
        <strong class="stat-value" id="statWebsites">—</strong>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
        </svg>
      </div>
      <div class="stat-content">
        <span class="stat-label">Conversations</span>
        <strong class="stat-value" id="statConvos">—</strong>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
      </div>
      <div class="stat-content">
        <span class="stat-label">Trained Sites</span>
        <strong class="stat-value" id="statTrained">—</strong>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="1" y="4" width="22" height="16" rx="2"/>
          <line x1="1" y1="10" x2="23" y2="10"/>
        </svg>
      </div>
      <div class="stat-content">
        <span class="stat-label">Plan</span>
        <strong class="stat-value" id="statPlan">—</strong>
      </div>
    </div>
  </section>

  <!-- ═══ Websites ═══ -->
  <section>
    <div class="section-header">
      <span class="section-title">Your Websites</span>
    </div>
    <div id="websitesList" style="display:flex;flex-direction:column;gap:12px;">
      <div class="loading-row">
        <div class="loader"></div>
        Loading websites…
      </div>
    </div>
  </section>

  <!-- ═══ Billing ═══ -->
  <section>
    <div class="section-header">
      <span class="section-title">Billing &amp; Subscription</span>
    </div>
    <div class="card">
      <div class="card-body" id="billingSection">
        <div class="loading-row"><div class="loader"></div>Loading billing…</div>
      </div>
    </div>
  </section>

  <!-- ═══ Account ═══ -->
  <section>
    <div class="section-header">
      <span class="section-title">Account Settings</span>
    </div>
    <div class="card">
      <div class="card-body">
        <form class="account-form" onsubmit="saveAccount(event)">
          <div class="input-group">
            <label for="newEmail">New Email <span style="color:var(--text-muted);font-weight:400">(leave empty to keep current)</span></label>
            <input id="newEmail" type="email" placeholder="new@example.com" autocomplete="off"/>
          </div>
          <div class="input-group">
            <label for="newPw">New Password <span style="color:var(--text-muted);font-weight:400">(leave empty to keep current)</span></label>
            <input id="newPw" type="password" placeholder="Min. 8 characters" autocomplete="new-password"/>
          </div>
          <div class="input-group">
            <label for="confirmPw">Confirm New Password</label>
            <input id="confirmPw" type="password" placeholder="Repeat new password" autocomplete="new-password"/>
          </div>
          <div style="border-top:1px solid var(--border);padding-top:16px;">
            <div class="input-group" style="max-width:360px">
              <label for="currentPw">Current Password <span style="color:var(--red)">*</span></label>
              <input id="currentPw" type="password" placeholder="Required to save changes" autocomplete="current-password"/>
            </div>
          </div>
          <div class="error-msg" id="accountErr"></div>
          <div style="color:var(--green);font-size:0.82rem;min-height:18px" id="accountSuccess"></div>
          <div>
            <button class="btn-primary" type="submit" id="saveAccountBtn">Save changes</button>
          </div>
        </form>
      </div>
    </div>
  </section>

</main>

<script src="dashboard.js?v=20260319a"></script>
</body>
</html>
