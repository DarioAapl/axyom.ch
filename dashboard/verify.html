<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AXYOM · Verify Email</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dashboard.css?v=20260324a">
  <link rel="icon" type="image/png" href="../Assets/axyomfavicon.png">
  <link rel="apple-touch-icon" href="../Assets/axyomfavicon.png">
</head>
<body class="login-page">

<div class="login-scene">
  <div class="login-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="login-card" style="text-align:center">
    <div class="login-brand">
      <img src="../Assets/axyomwhitelogo.png" alt="AXYOM" style="height:28px;display:block">
      <h1>AXYOM</h1>
    </div>

    <div id="stateLoading" style="margin-top:24px">
      <div class="spinner" style="margin:0 auto 16px"></div>
      <p class="login-sub">Verifying your email…</p>
    </div>

    <div id="stateSuccess" style="display:none;margin-top:24px">
      <div style="font-size:48px;margin-bottom:12px">✅</div>
      <h2 style="color:var(--accent);margin-bottom:8px">Email verified!</h2>
      <p class="login-sub">Your account is now active. Redirecting to your dashboard…</p>
    </div>

    <div id="stateError" style="display:none;margin-top:24px">
      <div style="font-size:48px;margin-bottom:12px">❌</div>
      <h2 style="color:#e05252;margin-bottom:8px">Verification failed</h2>
      <p class="login-sub" id="errorMsg">The link is invalid or has expired.</p>
      <a href="register.html" class="btn-primary" style="display:inline-block;margin-top:20px;text-decoration:none">
        Register again
      </a>
    </div>
  </div>
</div>

<script>
const API = "https://api.axyom.ch";

(async () => {
  const token = new URLSearchParams(location.search).get("token");

  if (!token) {
    show("stateError");
    document.getElementById("errorMsg").textContent = "No verification token found in the URL.";
    return;
  }

  try {
    const res = await fetch(`${API}/customer/verify?token=${encodeURIComponent(token)}`);
    const data = await res.json();

    if (!res.ok) {
      show("stateError");
      document.getElementById("errorMsg").textContent = data.detail || "Verification failed.";
      return;
    }

    // Store the new verified token and redirect to dashboard
    if (data.access_token) {
      localStorage.setItem("axyom_token", data.access_token);
      localStorage.setItem("axyom_customer_id", data.customer_id);
    }

    show("stateSuccess");
    setTimeout(() => { location.href = "/dashboard/"; }, 2000);

  } catch (err) {
    show("stateError");
    document.getElementById("errorMsg").textContent = "Network error. Please try again.";
  }
})();

function show(id) {
  document.getElementById("stateLoading").style.display = "none";
  document.getElementById(id).style.display = "block";
}
</script>

<style>
.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid rgba(0,178,160,0.2);
  border-top-color: var(--accent, #00B2A0);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>

</body>
</html>
