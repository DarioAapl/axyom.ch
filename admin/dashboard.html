<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AXYOM · Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css?v=20260324a">
  <link rel="icon" type="image/png" href="../Assets/axyomfavicon.png">
  <link rel="apple-touch-icon" href="../Assets/axyomfavicon.png">
</head>

<body class="dashboard-page">

<!-- ═══ Top Nav ═══ -->
<header class="nav">
  <div class="brand">
    <div class="brand-mark">
      <img src="../Assets/axyomwhitelogo.png" alt="AXYOM" style="height:30px;display:block">
    </div>
  </div>
  <div class="nav-right">
    <span class="nav-pill" id="adminEmail"></span>
    <span class="nav-pill muted" id="deployInfo">Deploy: —</span>
    <button class="btn-nav" onclick="logout()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Logout
    </button>
  </div>
</header>

<main class="dashboard">

  <!-- ═══ Stats Row ═══ -->
  <section class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
      </div>
      <div class="stat-content">
        <span class="stat-label">Customers</span>
        <strong class="stat-value" id="statCustomers">—</strong>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
      </div>
      <div class="stat-content">
        <span class="stat-label">API Keys</span>
        <strong class="stat-value" id="statKeys">—</strong>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </div>
      <div class="stat-content">
        <span class="stat-label">Uptime</span>
        <strong class="stat-value" id="statUptime">—</strong>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
      </div>
      <div class="stat-content">
        <span class="stat-label">Active Subscriptions</span>
        <strong class="stat-value" id="statActiveSubs">—</strong>
      </div>
    </div>
  </section>

  <!-- ═══ Create Key ═══ -->
  <section class="card">
    <div class="card-header">
      <h2>Create API Key</h2>
      <span class="badge">New</span>
    </div>
    <div class="form-row">
      <div class="input-group">
        <label for="newEmail">Email</label>
        <input id="newEmail" type="email" placeholder="customer@company.com" />
      </div>
      <div class="input-group">
        <label for="newDomain">Domain</label>
        <input id="newDomain" placeholder="example.com" />
      </div>
      <button class="btn-primary" onclick="createKey()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Create Key
      </button>
    </div>
    <div class="feedback" id="createKeyMsg"></div>
  </section>

  <!-- ═══ Customers ═══ -->
  <section class="card">
    <div class="card-header">
      <h2>Customers</h2>
    </div>
    <div class="table-wrap">
      <table class="table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Email</th>
            <th>Status</th>
            <th>Plan</th>
            <th>Created</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="customersTable"></tbody>
      </table>
    </div>
  </section>

  <!-- ═══ API Keys ═══ -->
  <section class="card">
    <div class="card-header">
      <h2>API Keys</h2>
    </div>
    <div class="table-wrap">
      <table class="table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Key</th>
            <th>Website</th>
            <th>Status</th>
            <th>Created</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="keysTable"></tbody>
      </table>
    </div>
  </section>

  <!-- ═══ Websites ═══ -->
  <section class="card">
    <div class="card-header">
      <h2>Websites</h2>
    </div>
    <div class="table-wrap">
      <table class="table websites">
        <thead>
          <tr>
            <th>ID</th>
            <th>Domain</th>
            <th>Analysis</th>
            <th>Usage</th>
            <th>Info</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="websitesTable"></tbody>
      </table>
    </div>
  </section>

</main>

<!-- ═══ Modal Overlay ═══ -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="modalTitle">Confirm</h3>
      <button class="modal-close" onclick="closeModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<script src="admin-dashboard.js?v=20260324a"></script>
</body>
</html>
