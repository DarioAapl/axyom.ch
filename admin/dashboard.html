<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AXYOM · Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="admin.css?v=20260317">
</head>
<body class="dashboard-page">

<header class="nav">
  <div class="brand">
    <img src="/adminlogo.png" alt="AXYOM" />
  </div>
  <div class="nav-right">
    <span class="pill subtle" id="adminEmail"></span>
    <span class="pill subtle" id="deployInfo">Deploy: —</span>
    <button class="btn ghost" onclick="logout()">Logout</button>
  </div>
</header>

<main class="dashboard">

  <section class="stats">
    <div class="stat">
      <span>Customers</span>
      <strong id="statCustomers">—</strong>
    </div>
    <div class="stat">
      <span>API Keys</span>
      <strong id="statKeys">—</strong>
    </div>
  </section>

  <section class="panel">
    <h2>Create API Key</h2>
    <div class="form-row">
      <input id="newEmail" placeholder="Customer email" />
      <input id="newDomain" placeholder="Domain (example.com)" />
      <button class="btn primary" onclick="createKey()">Create Key</button>
    </div>
    <div class="success" id="createKeyMsg"></div>
  </section>

  <section class="panel">
    <h2>Customers</h2>
    <table class="table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Email</th>
          <th>Status</th>
          <th>Created</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="customersTable"></tbody>
    </table>
  </section>

  <section class="panel">
    <h2>API Keys</h2>
    <table class="table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Key</th>
          <th>Website</th>
          <th>Status</th>
          <th>Created</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="keysTable"></tbody>
    </table>
  </section>

  <section class="panel">
    <h2>Websites</h2>
    <table class="table websites">
      <thead>
        <tr>
          <th>ID</th>
          <th>Domain</th>
          <th>Analysis</th>
          <th>Info</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="websitesTable"></tbody>
    </table>
  </section>

</main>

<!-- Modal (replaces alert / confirm / prompt) -->
<div id="modal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <p id="modal-msg"></p>
    <input type="text" id="modal-input" class="modal-input" style="display:none" />
    <div class="modal-actions">
      <button class="btn primary" id="modal-ok">OK</button>
      <button class="btn ghost"   id="modal-cancel">Cancel</button>
    </div>
  </div>
</div>

<script src="admin-dashboard.js?v=20260317"></script>
</body>
</html>
