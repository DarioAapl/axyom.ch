<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AXYOM · Admin Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css?v=20260317d" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
</head>
<body class="login-page">

  <div class="login-scene">
    <!-- Animated background -->
    <div class="login-bg">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
    </div>

    <main class="login-card">
      <div class="login-brand">
        <img src="/adminlogo.png" alt="AXYOM" style="height:48px;display:block">
      </div>
      <p class="login-sub">Admin access only</p>

      <div class="login-fields">
        <div class="input-group">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="admin@axyom.ch" autocomplete="email" />
        </div>
        <div class="input-group">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <button class="btn-primary full" onclick="login()">Sign in</button>
        <div class="error" id="loginError"></div>
      </div>

      <p class="login-footer">Powered by AXYOM AI</p>
    </main>
  </div>

  <script src="admin-login.js?v=20260317d"></script>
</body>
</html>
