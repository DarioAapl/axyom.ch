<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>AXYOM — Coming Soon</title>

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="AXYOM. Coming soon." />

  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="icon" href="/favicon.ico">
</head>

<body>
  <div class="scene">
    <div class="wrapper">
      <img src="axyomlogo2026.png" alt="AXYOM logo" class="logo" />
      <h1 class="glitch-title">COMING SOON</h1>
      <p class="subtitle">
        A new dimension of intelligence is approaching.<br><br>
        <span style="font-size: 0.8em; opacity: 0.7;">Developed by Dario Tino & Levin Guntli</span>
      </p>


    </div>

    <!-- 3D Background Elements -->
    <div class="grid-floor"></div>

    <div class="cubes">
      <div class="cube">
        <div class="face front"></div>
        <div class="face back"></div>
        <div class="face right"></div>
        <div class="face left"></div>
        <div class="face top"></div>
        <div class="face bottom"></div>
      </div>
      <div class="cube">
        <div class="face front"></div>
        <div class="face back"></div>
        <div class="face right"></div>
        <div class="face left"></div>
        <div class="face top"></div>
        <div class="face bottom"></div>
      </div>
      <div class="cube">
        <div class="face front"></div>
        <div class="face back"></div>
        <div class="face right"></div>
        <div class="face left"></div>
        <div class="face top"></div>
        <div class="face bottom"></div>
      </div>
      <div class="cube">
        <div class="face front"></div>
        <div class="face back"></div>
        <div class="face right"></div>
        <div class="face left"></div>
        <div class="face top"></div>
        <div class="face bottom"></div>
      </div>
      <div class="cube">
        <div class="face front"></div>
        <div class="face back"></div>
        <div class="face right"></div>
        <div class="face left"></div>
        <div class="face top"></div>
        <div class="face bottom"></div>
      </div>
    </div>
  </div>

  <script>
    // Parallax effect on mouse move for the 3D scene
    document.addEventListener('mousemove', (e) => {
      const scene = document.querySelector('.scene');
      // Calculate rotation based on cursor position relative to center of screen
      const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
      const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
      // Apply the 3D rotation
      scene.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
    });
  </script>
</body>

</html>
